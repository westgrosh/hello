<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Hello Page</title>

    <!-- bootstrap -->

    <link rel="icon" href="./img/bear.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"
        integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>


</head>

<body>
    <div class="say_hello">
        <div class="my_name">
            Всем привет! Это моя Welcome Page!
        </div>

        <div class="my_info">
            <div class="my_photo" style="display: inline-block;">
                <img src="./img/my_photo.jpg">
            </div>
            <div class="some_info" style="display: inline-block; text-align: left; 
            position: relative; top: 40px; left: 20px;">
                <p><b>Грошев Владимир</b></p>
                <p>Full-stack разработчик</p>
                <p>Любимый ЯП: Java &#10084;</p>
            </div>
        </div>


        <button type="button" class="btn btn-primary" id="btn_hello"
            style="position: relative; top: 200px;">Поздороваться
            с Вовой</button>


    </div>




    <script>

        $('#btn_hello').click(function () {

            result = prompt('Ой, а как Вас зовут?', 'Cтесняшка');

            if (result === null) {

            } else {

                alert("Привет " + result + "!");
            }

        });


    </script>

</body>

</html>
